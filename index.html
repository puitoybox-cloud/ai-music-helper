<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Music Helper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">AI Music Helper</p>
      <h1>音楽制作メモ＆プロンプト作成</h1>
      <p class="lead">iPadのブラウザで、曲情報・歌詞・制作チェックをまとめて管理できます。保存はこの端末のlocalStorageだけを使います。</p>
    </div>
    <div class="hero-actions" aria-label="保存とファイル操作">
      <button type="button" id="saveButton" class="primary">保存</button>
      <button type="button" id="exportButton">JSON書き出し</button>
      <label class="file-button" for="importFile">JSON読み込み</label>
      <input type="file" id="importFile" accept="application/json,.json" />
      <button type="button" id="resetButton" class="danger">リセット</button>
    </div>
  </header>

  <main class="app-shell">
    <section class="card" aria-labelledby="song-info-title">
      <div class="section-heading">
        <span>01</span>
        <h2 id="song-info-title">曲情報</h2>
      </div>
      <div class="grid two-columns">
        <label>曲名
          <input id="title" type="text" placeholder="例：夜明けのシグナル" autocomplete="off" />
        </label>
        <label>ジャンル
          <input id="genre" type="text" placeholder="例：J-Pop / Synth Pop" autocomplete="off" />
        </label>
        <label>BPM
          <input id="bpm" type="number" min="1" max="300" inputmode="numeric" placeholder="例：128" />
        </label>
        <label>キー
          <input id="key" type="text" placeholder="例：Cメジャー / A minor" autocomplete="off" />
        </label>
      </div>
      <label>曲の雰囲気
        <textarea id="mood" rows="4" placeholder="例：透明感があり、少し切ないけれど前向き。夜から朝に変わるような空気感。"></textarea>
      </label>
      <label>参考イメージ
        <textarea id="reference" rows="4" placeholder="参考曲、音色、映像、歌声、アレンジの方向性などをメモ"></textarea>
      </label>
    </section>

    <section class="card" aria-labelledby="lyrics-title">
      <div class="section-heading">
        <span>02</span>
        <h2 id="lyrics-title">歌詞整理</h2>
      </div>
      <div class="grid lyrics-grid">
        <label>イントロ
          <textarea id="lyricsIntro" rows="5" placeholder="イントロの言葉やナレーション"></textarea>
        </label>
        <label>Aメロ
          <textarea id="lyricsVerseA" rows="5" placeholder="Aメロの歌詞"></textarea>
        </label>
        <label>Bメロ
          <textarea id="lyricsVerseB" rows="5" placeholder="Bメロの歌詞"></textarea>
        </label>
        <label>サビ
          <textarea id="lyricsChorus" rows="5" placeholder="サビの歌詞"></textarea>
        </label>
        <label>間奏
          <textarea id="lyricsInterlude" rows="5" placeholder="間奏のメモや歌詞"></textarea>
        </label>
        <label>ラスサビ
          <textarea id="lyricsFinalChorus" rows="5" placeholder="ラスサビの歌詞"></textarea>
        </label>
      </div>
    </section>

    <section class="card" aria-labelledby="prompt-title">
      <div class="section-heading">
        <span>03</span>
        <h2 id="prompt-title">AI音楽プロンプト</h2>
      </div>
      <button type="button" id="generateButton" class="primary wide">日本語・英語プロンプトを生成</button>
      <div class="grid prompt-grid">
        <label>日本語プロンプト
          <textarea id="promptJa" rows="10" readonly placeholder="生成ボタンを押すと表示されます"></textarea>
        </label>
        <label>English Prompt
          <textarea id="promptEn" rows="10" readonly placeholder="Press generate to create a prompt"></textarea>
        </label>
      </div>
    </section>

    <section class="card" aria-labelledby="checklist-title">
      <div class="section-heading">
        <span>04</span>
        <h2 id="checklist-title">制作チェックリスト</h2>
      </div>
      <div id="checklist" class="checklist" aria-live="polite"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>
</html>
